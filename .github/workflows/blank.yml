<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarify Home | Exterior Cleaning in Central Florida</title>
<meta name="description" content="Central Florida's trusted exterior cleaning experts — pressure washing, window cleaning, gutter cleaning, paver sealing & more in Orlando, Winter Park, Kissimmee and beyond. Free quotes.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#07142e;
    --navy-2:#0b1d3f;
    --navy-3:#102a54;
    --cyan:#38d2e6;
    --cyan-glow:rgba(56,210,230,.35);
    --text:#eaf2ff;
    --muted:#9db3d4;
    --card:rgba(255,255,255,.04);
    --card-brd:rgba(56,210,230,.15);
    --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{
    font-family:'Manrope',system-ui,sans-serif;
    background:var(--navy);
    color:var(--text);
    line-height:1.6;
    overflow-x:hidden;
  }
  h1,h2,h3,.display{font-family:'Archivo',sans-serif;letter-spacing:-.02em;line-height:1.05}
  a{color:inherit;text-decoration:none}
  .wrap{width:min(1160px,92%);margin:0 auto}
  .cyan{color:var(--cyan)}

  /* NAV (non-sticky for iframe embed) */
  header{
    background:rgba(7,20,46,.92);
    border-bottom:1px solid rgba(56,210,230,.12);
  }
  .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
  .logo{display:flex;align-items:center;gap:11px;font-family:'Archivo';font-weight:800;font-size:20px}
  .logo img{height:44px;width:auto;display:block;border-radius:8px}
  .nav-right{display:flex;align-items:center;gap:22px}
  .nav-phone{color:var(--muted);font-weight:600;font-size:15px;transition:color .2s}
  .nav-phone:hover{color:var(--cyan)}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    background:linear-gradient(135deg,var(--cyan),#20a9c4);
    color:#03101f;font-weight:800;font-family:'Archivo';
    padding:12px 22px;border-radius:12px;font-size:15px;
    border:none;cursor:pointer;transition:transform .18s,box-shadow .18s;
    box-shadow:0 8px 24px -8px var(--cyan-glow);
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 14px 30px -8px var(--cyan-glow)}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--card-brd);box-shadow:none}
  .btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
  @media(max-width:640px){.nav-phone{display:none}}
  @media(max-width:420px){.nav .btn{padding:11px 16px;font-size:14px}.logo img{height:38px}}

  /* HERO */
  .hero{position:relative;padding:64px 0 80px;overflow:hidden}
  .hero::before{
    content:"";position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(60% 50% at 80% 0%,rgba(56,210,230,.16),transparent 70%),
      radial-gradient(50% 60% at 0% 100%,rgba(27,143,168,.14),transparent 70%);
    pointer-events:none;
  }
  .hero .wrap{position:relative;z-index:1;display:grid;grid-template-columns:1.05fr .95fr;gap:54px;align-items:center}
  @media(max-width:920px){.hero .wrap{grid-template-columns:1fr;gap:38px}}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(56,210,230,.1);border:1px solid var(--card-brd);
    color:var(--cyan);font-weight:700;font-size:13px;letter-spacing:.04em;
    text-transform:uppercase;padding:7px 14px;border-radius:100px;margin-bottom:22px;
  }
  .hero h1{font-size:clamp(34px,4.8vw,54px);font-weight:900;margin-bottom:18px}
  .hero p.sub{font-size:clamp(17px,2vw,20px);color:var(--muted);max-width:520px;margin-bottom:30px}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:34px}
  .trust{display:flex;gap:12px 24px;flex-wrap:wrap}
  .trust-item{display:flex;align-items:center;gap:9px;color:var(--muted);font-weight:600;font-size:14px}
  .trust-item svg{width:19px;height:19px;color:var(--cyan);flex-shrink:0}
  .trust-item .gstar{color:#ffc751}

  /* FORM CARD */
  .form-card{
    background:linear-gradient(180deg,rgba(16,42,84,.6),rgba(11,29,63,.5));
    border:1px solid var(--card-brd);border-radius:22px;
    padding:30px 28px;box-shadow:0 30px 60px -25px rgba(0,0,0,.6);
  }
  .form-card h3{font-size:23px;font-weight:800;margin-bottom:4px}
  .form-card .fc-sub{color:var(--muted);font-size:14.5px;margin-bottom:20px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{
    width:100%;background:rgba(7,20,46,.6);border:1px solid rgba(56,210,230,.18);
    border-radius:11px;padding:13px 14px;color:var(--text);font-family:inherit;font-size:16px;
    transition:border-color .18s,box-shadow .18s;
  }
  .field input::placeholder,.field textarea::placeholder{color:#5f77a0}
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(56,210,230,.14);
  }
  .field textarea{resize:vertical;min-height:74px}
  /* service pills */
  .pills{display:flex;flex-wrap:wrap;gap:8px}
  .pill{
    position:relative;display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;
    background:rgba(7,20,46,.6);border:1px solid rgba(56,210,230,.2);
    color:var(--muted);font-size:13.5px;font-weight:600;
    padding:9px 13px;border-radius:100px;transition:all .16s;
  }
  .pill:hover{border-color:var(--cyan);color:var(--text)}
  .pill .tick{width:15px;height:15px;border-radius:50%;border:1.5px solid rgba(56,210,230,.4);display:grid;place-items:center;transition:all .16s}
  .pill .tick svg{width:9px;height:9px;color:#03101f;opacity:0;transition:opacity .16s}
  .pill.on{background:rgba(56,210,230,.14);border-color:var(--cyan);color:var(--text)}
  .pill.on .tick{background:var(--cyan);border-color:var(--cyan)}
  .pill.on .tick svg{opacity:1}
  .pill input{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:420px){.row-2{grid-template-columns:1fr}}
  .form-card .btn{width:100%;justify-content:center;margin-top:6px;padding:15px}
  .form-note{text-align:center;color:var(--muted);font-size:12.5px;margin-top:12px}
  .form-msg{display:none;text-align:center;padding:14px;border-radius:11px;margin-top:14px;font-weight:600;font-size:14.5px}
  .form-msg.ok{display:block;background:rgba(56,210,230,.12);border:1px solid var(--card-brd);color:var(--cyan)}
  .form-msg.err{display:block;background:rgba(255,90,90,.1);border:1px solid rgba(255,90,90,.3);color:#ff8f8f}

  /* SECTION HELPERS */
  section{padding:76px 0}
  .sec-head{text-align:center;max-width:620px;margin:0 auto 50px}
  .sec-head .eyebrow{margin-bottom:16px}
  .sec-head h2{font-size:clamp(30px,4vw,44px);font-weight:800;margin-bottom:14px}
  .sec-head p{color:var(--muted);font-size:17px}

  /* HOW IT WORKS */
  .how{background:var(--navy);padding-top:60px}
  .hiw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:760px){.hiw-grid{grid-template-columns:1fr}}
  .hiw{
    background:var(--card);border:1px solid rgba(56,210,230,.12);border-radius:var(--radius);
    padding:30px 24px;text-align:center;transition:transform .2s,border-color .2s;
  }
  .hiw:hover{transform:translateY(-4px);border-color:var(--card-brd)}
  .hiw-n{
    width:54px;height:54px;margin:0 auto 16px;border-radius:16px;
    background:linear-gradient(135deg,var(--cyan),#1b8fa8);color:#03101f;
    font-family:'Archivo';font-weight:900;font-size:24px;display:grid;place-items:center;
    box-shadow:0 10px 24px -8px var(--cyan-glow);
  }
  .hiw h3{font-size:19px;font-weight:800;margin-bottom:8px}
  .hiw p{color:var(--muted);font-size:14.5px}

  /* SERVICES */
  .services{background:linear-gradient(180deg,var(--navy),var(--navy-2))}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:900px){.grid-3{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.grid-3{grid-template-columns:1fr}}
  .svc{
    background:var(--card);border:1px solid rgba(56,210,230,.12);border-radius:var(--radius);
    overflow:hidden;transition:transform .2s,border-color .2s,background .2s;position:relative;
    cursor:pointer;display:flex;flex-direction:column;text-align:left;
  }
  .svc:hover{transform:translateY(-6px);border-color:var(--card-brd);background:rgba(56,210,230,.05)}
  .svc-media{height:172px;overflow:hidden;position:relative;background:rgba(56,210,230,.06)}
  .svc-media img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;display:block}
  .svc:hover .svc-media img{transform:scale(1.07)}
  .svc-body{padding:22px 22px 24px}
  .svc h3{font-size:19px;font-weight:800;margin-bottom:8px}
  .price-tag{
    display:inline-block;background:rgba(56,210,230,.12);border:1px solid var(--card-brd);
    color:var(--cyan);font-family:'Archivo';font-weight:800;font-size:12.5px;
    padding:4px 11px;border-radius:100px;margin-bottom:10px;
  }
  .svc p{color:var(--muted);font-size:14.5px;margin-bottom:14px}
  .svc .learn{display:inline-flex;align-items:center;gap:7px;color:var(--cyan);font-weight:700;font-family:'Archivo';font-size:14px}
  .svc .learn svg{width:15px;height:15px;transition:transform .2s}
  .svc:hover .learn svg{transform:translateX(3px)}

  /* MODAL — anchored to tapped card so it opens in view (iframe-safe) */
  .modal-overlay{
    position:absolute;top:0;left:0;right:0;z-index:100;
    background:rgba(3,10,25,.82);display:none;
  }
  .modal-overlay.open{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{
    position:absolute;left:50%;transform:translateX(-50%);
    width:min(560px,calc(100vw - 28px));
    background:linear-gradient(180deg,var(--navy-3),var(--navy-2));
    border:1px solid var(--card-brd);border-radius:22px;
    overflow:hidden;box-shadow:0 40px 80px -20px rgba(0,0,0,.7);
    animation:pop .25s cubic-bezier(.2,.8,.3,1.2);
  }
  @keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(18px) scale(.97)}to{opacity:1;transform:translateX(-50%)}}
  .modal-media{height:180px;overflow:hidden;position:relative;background:rgba(56,210,230,.06)}
  .modal-media img{width:100%;height:100%;object-fit:cover;display:block}
  .modal-media::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(11,29,63,.85))}
  .modal-x{
    position:absolute;top:14px;right:14px;z-index:2;width:40px;height:40px;border-radius:10px;
    background:rgba(7,20,46,.75);border:1px solid var(--card-brd);color:var(--text);
    display:grid;place-items:center;cursor:pointer;transition:background .18s,transform .18s;
  }
  .modal-x:hover{background:rgba(56,210,230,.2);transform:rotate(90deg)}
  .modal-x svg{width:18px;height:18px}
  .modal-body{padding:26px 30px 30px}
  .modal-body h3{font-size:26px;font-weight:800;margin-bottom:6px}
  .modal-body .m-sub{color:var(--muted);font-size:15px;margin-bottom:20px}
  .modal-body .price-tag{margin-bottom:16px}
  .steps{display:grid;gap:14px;margin-bottom:26px}
  .step{display:flex;gap:15px;align-items:flex-start}
  .step .n{
    width:34px;height:34px;flex-shrink:0;border-radius:10px;
    background:linear-gradient(135deg,var(--cyan),#1b8fa8);color:#03101f;
    font-family:'Archivo';font-weight:900;font-size:15px;display:grid;place-items:center;
    box-shadow:0 6px 16px -6px var(--cyan-glow);
  }
  .step .st{padding-top:4px}
  .step .st h4{font-family:'Manrope';font-size:15.5px;font-weight:700;color:var(--text);line-height:1.4}
  .modal-body .btn{width:100%;justify-content:center;padding:15px}

  /* REVIEWS */
  .reviews{background:linear-gradient(180deg,var(--navy-2),var(--navy))}
  .rev-head{display:flex;flex-direction:column;align-items:center;text-align:center;max-width:640px;margin:0 auto 44px}
  .g-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid var(--card-brd);border-radius:100px;padding:10px 18px;margin-bottom:20px}
  .g-badge .g-logo{width:22px;height:22px;flex-shrink:0}
  .g-badge .g-stars{display:flex;gap:2px}
  .g-badge .g-stars svg{width:16px;height:16px;color:#ffc751}
  .g-badge .g-txt{font-weight:700;font-size:14px;color:var(--text)}
  .g-badge .g-txt span{color:var(--muted);font-weight:600}
  .rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:900px){.rev-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.rev-grid{grid-template-columns:1fr}}
  .review{
    background:var(--card);border:1px solid rgba(56,210,230,.12);border-radius:var(--radius);
    padding:24px 22px;display:flex;flex-direction:column;transition:transform .2s,border-color .2s;
  }
  .review:hover{transform:translateY(-4px);border-color:var(--card-brd)}
  .review .r-stars{display:flex;gap:2px;margin-bottom:13px}
  .review .r-stars svg{width:16px;height:16px;color:#ffc751}
  .review .r-text{color:var(--text);font-size:14.5px;line-height:1.62;margin-bottom:18px;flex-grow:1}
  .review .r-foot{display:flex;align-items:center;gap:11px}
  .review .r-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),#1b8fa8);color:#03101f;font-family:'Archivo';font-weight:900;font-size:16px;display:grid;place-items:center;flex-shrink:0}
  .review .r-name{font-weight:700;font-size:14.5px;color:var(--text)}
  .review .r-meta{font-size:12.5px;color:var(--muted)}
  .rev-cta{text-align:center;margin-top:38px}
  .rev-cta .btn svg{width:18px;height:18px}

  /* WHY */
  .why .wrap{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}
  @media(max-width:880px){.why .wrap{grid-template-columns:1fr;gap:36px}}
  .why h2{font-size:clamp(30px,4vw,42px);font-weight:800;margin-bottom:18px}
  .why > .wrap > div > p.lead{color:var(--muted);font-size:17px;margin-bottom:26px}
  .why-list{display:grid;gap:16px}
  .why-item{display:flex;gap:15px;align-items:flex-start}
  .why-item .chk{width:30px;height:30px;flex-shrink:0;border-radius:9px;background:rgba(56,210,230,.12);display:grid;place-items:center;border:1px solid var(--card-brd)}
  .why-item .chk svg{width:16px;height:16px;color:var(--cyan)}
  .why-item h4{font-family:'Archivo';font-size:16.5px;font-weight:700;margin-bottom:2px}
  .why-item p{color:var(--muted);font-size:14.5px}
  .stats{background:linear-gradient(160deg,var(--navy-3),var(--navy-2));border:1px solid var(--card-brd);border-radius:22px;padding:36px;display:grid;grid-template-columns:1fr 1fr;gap:30px}
  .stat .num{font-family:'Archivo';font-size:40px;font-weight:900;color:var(--cyan);line-height:1}
  .stat .lbl{color:var(--muted);font-size:14px;margin-top:6px}

  /* SERVICE AREAS */
  .areas{background:linear-gradient(180deg,var(--navy),var(--navy-2))}
  .areas-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:22px;align-items:stretch}
  @media(max-width:820px){.areas-grid{grid-template-columns:1fr}}
  .map-card{border:1px solid var(--card-brd);border-radius:var(--radius);overflow:hidden;min-height:340px;background:var(--navy-3)}
  .map-card iframe{width:100%;height:100%;min-height:340px;border:0;display:block;filter:invert(90%) hue-rotate(180deg) saturate(.65) contrast(.92)}
  .cities{background:var(--card);border:1px solid rgba(56,210,230,.12);border-radius:var(--radius);padding:28px 26px;display:flex;flex-direction:column;justify-content:center}
  .cities h3{font-size:20px;font-weight:800;margin-bottom:16px}
  .city-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .city{display:flex;align-items:center;gap:8px;color:var(--muted);font-weight:600;font-size:14.5px}
  .city svg{width:15px;height:15px;color:var(--cyan);flex-shrink:0}
  .cities .note{color:#5f77a0;font-size:13px;margin-top:18px}

  /* CTA STRIP */
  .cta-strip{background:linear-gradient(120deg,var(--navy-3),var(--navy));position:relative;overflow:hidden}
  .cta-strip::before{content:"";position:absolute;inset:0;background:radial-gradient(50% 120% at 50% 0%,rgba(56,210,230,.14),transparent 70%)}
  .cta-box{position:relative;text-align:center;max-width:640px;margin:0 auto}
  .cta-box h2{font-size:clamp(30px,4vw,42px);font-weight:800;margin-bottom:14px}
  .cta-box p{color:var(--muted);font-size:17px;margin-bottom:28px}
  .cta-box .btn{padding:16px 34px;font-size:16px}

  /* FOOTER */
  footer{background:var(--navy-2);border-top:1px solid rgba(56,210,230,.12);padding:54px 0 30px}
  .foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:36px;margin-bottom:36px}
  @media(max-width:760px){.foot-grid{grid-template-columns:1fr;gap:28px}}
  .foot-brand .logo{margin-bottom:14px}
  .foot-brand p{color:var(--muted);font-size:14.5px;max-width:300px}
  .foot-col h5{font-family:'Archivo';font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:var(--cyan);margin-bottom:16px}
  .foot-col a,.foot-col p{display:block;color:var(--muted);font-size:14.5px;margin-bottom:10px;transition:color .18s}
  .foot-col a:hover{color:var(--cyan)}
  .socials{display:flex;gap:12px;margin-top:4px}
  .socials a{width:42px;height:42px;border-radius:10px;background:var(--card);border:1px solid var(--card-brd);display:grid;place-items:center;transition:transform .18s,background .18s}
  .socials a:hover{transform:translateY(-3px);background:rgba(56,210,230,.12)}
  .socials svg{width:18px;height:18px;color:var(--cyan)}
  .foot-bottom{border-top:1px solid rgba(56,210,230,.1);padding-top:22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;color:#5f77a0;font-size:13px}

  /* STICKY MOBILE CTA (standalone hosting only — auto-hides inside iframe) */
  .sticky-cta{
    position:fixed;left:0;right:0;bottom:0;z-index:90;display:none;
    padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px));
    background:rgba(7,20,46,.95);backdrop-filter:blur(12px);
    border-top:1px solid var(--card-brd);
    transform:translateY(0);transition:transform .3s ease;
  }
  .sticky-cta .btn{width:100%;justify-content:center;padding:15px;font-size:16px}
  .sticky-cta.hidden{transform:translateY(130%)}
  @media(max-width:768px){
    .sticky-cta.show{display:block}
    body.has-sticky footer{padding-bottom:104px}
  }

  /* MOBILE TIGHTENING (phones) */
  @media(max-width:640px){
    section{padding:54px 0}
    .hero{padding:42px 0 58px}
    .hero-cta .btn{flex:1 1 auto;justify-content:center}
    .form-card{padding:24px 18px}
    .pill{padding:11px 15px;font-size:14px}
    .sec-head{margin-bottom:36px}
    .modal-media{height:150px}
    .modal-body{padding:22px 20px 26px}
    .modal-body h3{font-size:23px}
    .stats{padding:26px;gap:22px}
    .stat .num{font-size:34px}
    .city-grid{grid-template-columns:1fr 1fr}
  }

  /* reveal */
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
  .reveal.in{opacity:1;transform:none}
</style>
</head>
<body>

<!-- NAV -->
<header>
  <div class="wrap nav">
    <a href="#top" class="logo">
      <img src="https://i.ibb.co/zVRSS2Y1/Screenshot-2026-06-22-223338.png" alt="Clarify Home">
    </a>
    <nav class="nav-right">
      <a href="tel:+14073604214" class="nav-phone">(407) 360-4214</a>
      <a href="#quote" class="btn">Get a Free Quote</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero" id="top">
