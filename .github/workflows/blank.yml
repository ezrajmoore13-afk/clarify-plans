    {name:'Erik',meta:'Local Guide • 43 reviews',when:'1 week ago',text:'Very professional! They did an amazing job on my house! Do not hesitate to have them clean your windows. I was very impressed and will have them do work for me in the future. Thanks guys!'},
    {name:'Erica Tutt',meta:'2 reviews',when:'2 weeks ago',text:'Really impressed with these guys. They were polite, hardworking, and did a great job with the pressure washing. Everything looks so much better. Love seeing young people out there hustling. Would definitely recommend!'},
    {name:'Omari Thompson',meta:'13 reviews',when:'3 weeks ago',text:'Very pleased with the work. Pressure washed driveway, house, and fence. They also cleaned the windows. Looks great.'},
    {name:'Natalia',meta:'6 reviews',when:'4 weeks ago',text:'Manuel and his team did an excellent job at our home. They washed all the windows, window frames, roof gutters, exterior doors, and a wall, among other tasks. Additionally, they replaced several window screens for us. We are truly impressed by the work they performed. Manuel is a young entrepreneur who has left a lasting impression on us. Many thanks to the entire team.'},
    {name:'Diego Blohm',meta:'1 review • 2 photos',when:'5 weeks ago',text:'Clarify worked on my house doing window cleaning, they were so professional took the screens off and washed them and even did all the tracks. Would recommend 100% amazing group of young guys doing the right thing.'},
    {name:'Carolyn Mary Harding',meta:'2 reviews',when:'5 weeks ago',text:'Very professional, reasonably priced and spent several hours working on pressure washing our driveway and porch and cleaning out screens and windows. They were able to scrub away moldy spots on the screens and whole house looks great! Amazing results!'}
  ];
  const STAR='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l2.5 5 5.5.8-4 3.9.9 5.5L12 15.5 7.1 18.2l.9-5.5-4-3.9L9.5 8z"/></svg>';
  const revGrid=document.getElementById('revGrid');
  REVIEWS.forEach(r=>{
    const initial=r.name.trim().charAt(0).toUpperCase();
    const el=document.createElement('div');
    el.className='review';
    el.innerHTML=`
      <div class="r-stars">${STAR.repeat(5)}</div>
      <p class="r-text">${r.text}</p>
      <div class="r-foot">
        <div class="r-av">${initial}</div>
        <div>
          <div class="r-name">${r.name}</div>
          <div class="r-meta">${r.meta} • ${r.when}</div>
        </div>
      </div>`;
    revGrid.appendChild(el);
  });

  // ---- MODAL (anchored to tapped card — works inside tall Wix iframe) ----
  const overlay=document.getElementById('modal');
  const modalBox=document.getElementById('modalBox');
  const mModal=document.getElementById('mModal');
  const mTitle=document.getElementById('mTitle');
  const mSub=document.getElementById('mSub');
  const mPrice=document.getElementById('mPrice');
  const mSteps=document.getElementById('mSteps');

  function openModal(i,card){
    const s=SERVICES[i];
    mModal.innerHTML='<button class="modal-x" id="modalCloseInner" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 6l12 12M18 6L6 18"/></svg></button>';
    const im=document.createElement('img');
    im.src=s.img;im.alt=s.title;
    mModal.appendChild(im);
    document.getElementById('modalCloseInner').addEventListener('click',closeModal);
    mTitle.innerHTML=s.title;
    mSub.innerHTML=s.desc;
    mPrice.innerHTML=s.price?`<span class="price-tag">${s.price}</span>`:'';
    mSteps.innerHTML=s.steps.map((st,n)=>`<div class="step"><div class="n">${n+1}</div><div class="st"><h4>${st}</h4></div></div>`).join('');
    overlay.style.height=Math.max(document.documentElement.scrollHeight,document.body.scrollHeight)+'px';
    const top=card?Math.max(16,card.offsetTop-8):100;
    modalBox.style.top=top+'px';
    overlay.classList.add('open');
  }
  function closeModal(){overlay.classList.remove('open')}
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
  document.getElementById('mCta').addEventListener('click',closeModal);

  // ---- SERVICE PILLS ----
  document.querySelectorAll('#pills .pill').forEach(p=>{
    const cb=p.querySelector('input');
    const sync=()=>p.classList.toggle('on',cb.checked);
    cb.addEventListener('change',sync);
    sync();
  });

  // ---- STICKY MOBILE CTA (only when NOT inside an iframe) ----
  const sticky=document.getElementById('stickyCta');
  const inFrame=(()=>{try{return window.self!==window.top}catch(e){return true}})();
  if(!inFrame){
    sticky.classList.add('show');
    document.body.classList.add('has-sticky');
    // hide the bar while the quote form is on screen
    new IntersectionObserver(es=>{
      es.forEach(e=>sticky.classList.toggle('hidden',e.isIntersecting));
    },{threshold:.15}).observe(document.getElementById('quote'));
  }

  // ---- REVEAL (runs last, after all cards injected) ----
  const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

  // ---- FORM (Formspree AJAX) ----
  const form=document.getElementById('quoteForm');
  const msg=document.getElementById('formMsg');
  form.addEventListener('submit',async(e)=>{
    e.preventDefault();
    const btn=form.querySelector('button[type="submit"]');
    const orig=btn.textContent;
    btn.textContent='Sending...';btn.disabled=true;
    try{
      const res=await fetch(form.action,{method:'POST',body:new FormData(form),headers:{'Accept':'application/json'}});
      if(res.ok){
        form.reset();
        document.querySelectorAll('#pills .pill').forEach(p=>p.classList.remove('on'));
        msg.className='form-msg ok';
        msg.textContent="Thanks! We got your request and will reach out shortly.";
      }else{throw new Error('bad')}
    }catch(err){
      msg.className='form-msg err';
      msg.innerHTML='Something went wrong. Please call us at <a href="tel:+14073604214" style="color:inherit;text-decoration:underline">(407) 360-4214</a>.';
    }finally{btn.textContent=orig;btn.disabled=false}
  });
</script>
</body>
</html>
